<!doctype html>
<html class="no-js" lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="keyword" content="madpos,pos,inventory,invoice,sales,ecommerce,product,stock,customer,webcam,super sale,return,easy pos,admin">
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>madPOS | Sign In</title>

    <link rel="apple-touch-icon" href="../../public/assets/img/favicon.png">
    <link rel="icon" href="../../public/assets/img/favicon.png">

    <link href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500" rel="stylesheet">
    <link rel="stylesheet" href="../../public/assets/css/normalize.css">
    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="../../public/assets/css/font-awesome.min.css">
    <link rel="stylesheet" href="../../public/assets/css/main.css">
</head>

<body>
    <!--[if lte IE 9]>
        <p class="browserupgrade">You are using an <strong>outdated</strong> browser. Please <a href="https://chrome.com/">upgrade your browser</a> to improve your experience and security.</p>
    <![endif]-->
    <div id="wrapper" class="wrapper-login">
        <div class="login-inner">
            <div class="auth-logo">
                <img src="../../public/assets/img/madpos.png" alt="madPOS">
            </div>
            <div class="card mb-1">
                <div class="card-body p2050">
                    <div class="form-header">
                        <h5>Sign In</h5>
                        <p class="auth-subtitle">Continue to your madPOS dashboard.</p>
                    </div>
                </div>
            </div>
            <div class="form-wrapper">
                        <form action="#" method="post">
                        <div class="form">
                            <div class="form-group">
                                <input type="email" name="email" class="form-control" id="email" value="" aria-describedby="" placeholder="Enter email" required>
                            </div>
                            <div class="form-group">
                                <input type="password" name="password" value="" class="form-control" id="password" aria-describedby="" placeholder="Enter password" required>
                            </div>

                            <div class="form-group">
                                <input type="checkbox" name="remember" class="form-check-input" id="remember-me">
                                <label class="form-check-label" for="remember-me">Remember Me Plz</label>
                            </div>

                            <!-- 
                            <div class="form-group">
                                <div class="g-recaptcha" data-sitekey="6Lep8j8UAAAAAPzS5eNVxLxQ6Higp1C10qTCwbbZ"></div>
                            </div> -->

                            <input type="submit" class="btn btn-custom btn-fullwidth" id="loginBtn" data-id="dashboard" value="Submit">
                        </div>
                        </form>
                        <div class="login-footer">
                            <a href="../backend/forgot_password.html">Forgot Password</a> | <a href="../backend/signup.html">Register</a>
                        </div>

            </div>
        </div>
    </div>
    <script src="../../public/assets/js/vendor/modernizr-3.5.0.min.js"></script>
    <script src="../../public/assets/js/vendor/jquery-3.2.1.min.js"></script>
    <script src="https://ajax.aspnetcdn.com/ajax/jquery.validate/1.9/jquery.validate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="../../public/assets/js/bootstrap5-bridge.js"></script>
    <script src='https://www.google.com/recaptcha/api.js'></script>
    <script type="text/javascript">
        $('form').validate();
    </script>

</body>

</html>
